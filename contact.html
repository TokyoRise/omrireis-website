<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="nav-inner">
      <div class="nav-logo">
        <a href="index.html">Omri Reis</a>
      </div>
      <nav>
        <ul class="nav-links" id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>

          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
      <div class="nav-social">
        <a href="https://www.instagram.com/tokyo_rise/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://twitter.com/OmriReis" target="_blank" rel="noopener">Twitter</a>
        <a href="https://www.linkedin.com/in/omri-reis-b9aa271b/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== PAGE CONTENT ===== -->
  <main class="page-content">

    <div class="container">

      <div class="contact-hero">
        <p class="section-label">Say Hello</p>
        <h1>Get in touch.</h1>
        <p>Have a project in mind or just want to connect? I'd love to hear from you.</p>
        <a class="contact-email" href="mailto:omri.reis@gmail.com">omri.reis@gmail.com</a>
      </div>

      <!-- Contact form — uses Formspree for free form handling (no server needed) -->
      <!-- Replace YOUR_FORM_ID with your Formspree form ID after signing up at formspree.io -->
      <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="contact-form">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Tell me about your project…"></textarea>
        </div>

        <button type="submit" class="btn-submit">Send Message</button>
        <p id="form-status" style="margin-top:16px;font-size:0.88rem;color:#555;display:none;"></p>

      </form>

    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">

      <span class="footer-copy">&copy; <span id="year"></span> Omri Reis</span>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
